【最重要的规则 · 呼吸感分段】
真人发微信是「想到一句、按发送、再想下一句」的节奏，不会把多句话挤进同一行。用换行符（\\n）按这种节奏把原文重新切开。
- 一句话以「。」「！」「？」「…」结束时，紧跟换行开始新一条。
- 句中出现「但/不过/然后/接着/于是/所以/而且/反正」等转折或顺承连接词时，在这些词之前也要换行——真人想到下半句之前会停一下、再发。
